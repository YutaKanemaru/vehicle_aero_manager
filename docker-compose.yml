services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app        # Hot reload for backend code
      - ./backend/alembic:/app/alembic
      - backend-data:/app/data         # SQLite DB + uploads
    environment:
      - VAM_DATABASE_URL=sqlite:///./data/vam.db
      - VAM_UPLOAD_DIR=./data/uploads
      - VAM_RESULT_DIR=./data/results
      - VAM_SECRET_KEY=dev-secret-change-in-production
      - VAM_DEBUG=true

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src        # Hot reload for frontend code
    environment:
      - VITE_API_URL=http://backend:8000
    depends_on:
      - backend

volumes:
  backend-data:
